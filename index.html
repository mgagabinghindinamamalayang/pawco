<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Pawco Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stage">
    <div class="side-cat side-cat-left" aria-hidden="true"></div>

    <div id="app">
      <div class="frame-deco" aria-hidden="true">
        <span class="paw-corner paw-tl">ฅ</span>
        <span class="paw-corner paw-tr">ฅ</span>
        <span class="paw-corner paw-bl">ฅ^•ﻌ•^ฅ</span>
        <span class="paw-corner paw-br">ฅ</span>
        <div class="frame-line frame-line-t"></div>
        <div class="frame-line frame-line-b"></div>
      </div>
      <canvas id="game" width="480" height="720" aria-label="Pawco Pulse game"></canvas>

      <div id="hud" class="hidden">
        <div class="hud-left">
          <div class="label">SCORE</div>
          <div id="score">0</div>
        </div>
        <div class="hud-mid">
          <div id="combo" class="combo"></div>
          <div id="judgement" class="judgement"></div>
        </div>
        <div class="hud-right">
          <div class="label">LIVES</div>
          <div id="lives">♥♥♥</div>
          <button id="pauseBtn" class="pause-btn" type="button" title="Pause">❚❚</button>
        </div>
      </div>

      <div class="mobile-cat" aria-hidden="true"></div>

      <div id="stageBanner" class="stage-banner hidden" aria-hidden="true">
        <div class="stage-banner-bar">
          <span id="stageBannerTitle">STAGE 1</span>
          <span id="stageBannerSub">NORMAL</span>
        </div>
      </div>

      <!-- MAIN MENU -->
      <div id="title" class="overlay">
        <h1>PAWCO<br/>PULSE</h1>
        <div class="menu-stack">
          <button id="playBtn" type="button">START GAME</button>
        </div>
      </div>

      <!-- SONG SELECT (after Start Game) -->
      <div id="songs" class="overlay hidden">
        <h2 class="panel-title">CHOOSE SONG</h2>
        <div id="songList" class="song-list song-list-full" role="listbox" aria-label="Choose song"></div>
        <p class="paw-label">PAW COLOR</p>
        <div id="skinRow" class="skin-row" aria-label="Choose paw color"></div>
        <button id="songsBackBtn" class="btn-secondary" type="button">BACK</button>
      </div>

      <!-- PAUSE -->
      <div id="pause" class="overlay hidden">
        <h2 class="pause-title">PAUSED</h2>
        <div class="menu-stack">
          <button id="resumeBtn" type="button">RESUME</button>
          <button id="restartBtn" class="btn-secondary" type="button">RESTART</button>
          <button id="pauseQuitBtn" class="btn-secondary" type="button">MAIN MENU</button>
        </div>
      </div>

      <!-- RESULTS -->
      <div id="results" class="overlay hidden">
        <div id="cheerLayer" class="cheer-layer hidden" aria-hidden="true"></div>
        <p class="eyebrow" id="resultMood">meow…</p>
        <h2 id="grade">C</h2>
        <p class="tag" id="resultTitle">Treats secured</p>
        <ul class="stats">
          <li><span>Score</span><strong id="rScore">0</strong></li>
          <li><span>Perfects</span><strong id="rPerfects">0</strong></li>
          <li><span>Best combo</span><strong id="rCombo">0</strong></li>
          <li><span>Accuracy</span><strong id="rAcc">0%</strong></li>
        </ul>
        <div class="menu-stack">
          <button id="retryBtn" type="button">AGAIN</button>
          <button id="menuBtn" class="btn-secondary" type="button">MAIN MENU</button>
        </div>
      </div>
    </div>

    <div class="side-cat side-cat-right" aria-hidden="true"></div>
  </div>
  <script src="cats.js"></script>
  <script src="game.js"></script>
</body>
</html>
